name: CI
# Build, lint, and test the prov workspace on every push and pull request.
#
# prov's parser dependencies (`fig`, `twig-doc`) are Zig-backed — their
# build.rs runs `zig build` — so every job that *compiles* code needs the pinned
# Zig toolchain, exactly as the release (Homebrew) workflow does. The `fmt` job is
# the one exception: `cargo fmt --check` only parses, never builds, so it needs no
# Zig. The Zig version and the toolchain setup mirror `.github/workflows/homebrew.yml`.
on:
  push: { branches: [main] }
  pull_request: null
  workflow_dispatch: null

# Cancel superseded runs on the same ref — a new push makes the old one moot.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: rustfmt }
    - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with: { components: clippy }
    - uses: mlugg/setup-zig@v2
      with: { version: "0.16.0" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - uses: mlugg/setup-zig@v2
      with: { version: "0.16.0" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo test --workspace

  # The getting-started guide's command transcript, executed against a freshly
  # built binary so the docs can never drift from the CLI (see
  # ci/check-getting-started.sh and the note at the top of the guide).
  docs:
    name: Getting-started transcript
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - uses: mlugg/setup-zig@v2
      with: { version: "0.16.0" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo build -p prov-cli
    - run: ci/check-getting-started.sh

  # Build on the crate's declared minimum supported Rust version. A build, not a
  # test run: MSRV is a promise about who can *compile* prov, and the
  # dev-dependencies/test tooling need not hold to it. The version is read from
  # `workspace.package.rust-version` in Cargo.toml, so the pin can never drift
  # from the declared floor — bump it there and this job follows.
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - id: msrv
      run: |
        version=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "MSRV from Cargo.toml: $version"
    - uses: dtolnay/rust-toolchain@master
      with: { toolchain: "${{ steps.msrv.outputs.version }}" }
    - uses: mlugg/setup-zig@v2
      with: { version: "0.16.0" }
    - uses: Swatinem/rust-cache@v2
    - run: cargo build --workspace
